<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIPACH PhotoStudio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--panel:#16161f;--card:#1e1e2e;--border:#2a2a3a;
  --accent:#7c5cfc;--accent2:#fc5c9c;--text:#ffffff;--text2:#ffffff;
  --green:#4cffb0;--red:#ff4c6a;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.logo{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.hdr-right{display:flex;gap:7px;align-items:center}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .18s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-pri{background:linear-gradient(135deg,var(--accent),#9c7cff);color:#fff}
.btn-pri:hover{opacity:.85;transform:translateY(-1px)}
.btn-sec{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{opacity:.85}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden}

/* PANEL */
.panel{width:272px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:10px;display:flex;flex-direction:column;gap:10px}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* UPLOAD */
.upzone{border:2px dashed var(--border);border-radius:12px;padding:22px 14px;text-align:center;cursor:pointer;transition:all .2s;background:var(--card)}
.upzone:hover,.upzone.over{border-color:var(--accent);background:rgba(124,92,252,.08)}
.upzone .ico{font-size:30px;margin-bottom:7px}
.upzone p{color:var(--text2);line-height:1.6;font-size:12px}
.upzone p b{color:var(--text)}
.upzone input{display:none}

/* IMG INFO */
.imginfo{background:var(--card);border-radius:12px;padding:10px;display:none}
.imginfo.vis{display:block}
.imginfo .tw{width:100%;height:90px;border-radius:8px;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.imginfo .tw img{max-width:100%;max-height:100%;object-fit:contain}
.imginfo .meta{color:var(--text2);font-size:11px;margin-bottom:6px}
.chgbtn{width:100%;font-size:11px;padding:5px 8px}

/* SECTION */
.sec{background:var(--card);border-radius:12px;padding:11px 10px}
.stitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:9px}

/* ASPECT RATIO */
.argrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.arbtn{background:var(--panel);border:1px solid var(--border);border-radius:7px;color:var(--text2);cursor:pointer;padding:5px 2px;font-size:9px;font-weight:700;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.arbtn svg{display:block}
.arbtn:hover{border-color:var(--accent);color:var(--text)}
.arbtn.active{border-color:var(--accent);background:rgba(124,92,252,.15);color:var(--accent)}

/* PRESETS */
.pscroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px}
.pscroll::-webkit-scrollbar{height:3px}
.pscroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.pbtn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--text2);font-size:9px;font-weight:700;transition:color .15s}
.pthumb{width:46px;height:46px;border-radius:8px;background:var(--panel);border:2px solid transparent;overflow:hidden;transition:border-color .15s;position:relative}
.pthumb canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.pbtn.active .pthumb{border-color:var(--accent)}
.pbtn.active{color:var(--accent)}

/* SLIDERS */
.srow{display:flex;align-items:center;gap:5px;margin-bottom:7px;width:100%;overflow:visible}
.slbl{width:60px;font-size:10.5px;color:var(--text2);flex-shrink:0;white-space:nowrap}
.sinput{flex:1;min-width:0;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
.sinput::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;transition:transform .1s}
.sinput::-webkit-slider-thumb:hover{transform:scale(1.25)}
.sval{width:38px;flex-shrink:0;text-align:right;font-size:10.5px;color:var(--text2);font-variant-numeric:tabular-nums}
.reset-row{display:flex;justify-content:flex-end;margin-top:3px}
.resetlnk{background:none;border:none;color:var(--text2);font-size:11px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.resetlnk:hover{color:var(--accent)}

/* ANIMATIONS */
.animgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.animbtn{background:var(--panel);border:1px solid var(--border);border-radius:7px;color:var(--text2);cursor:pointer;padding:7px 3px;font-size:9px;font-weight:700;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.animbtn .ai{font-size:15px}
.animbtn:hover{border-color:var(--accent);color:var(--text)}
.animbtn.active{border-color:var(--accent);background:rgba(124,92,252,.15);color:var(--accent)}
.sprow{margin-top:9px;display:flex;align-items:center;gap:7px}

/* CANVAS AREA */
.carea{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(circle at 50% 50%,rgba(124,92,252,.05) 0%,transparent 65%);overflow:hidden;position:relative}
.cwrap{position:relative;display:flex;align-items:center;justify-content:center}
#preview{display:block;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04)}
.empty{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--text2);text-align:center}
.empty .eico{font-size:56px;opacity:.25}
.empty p{font-size:14px}

.recindicator{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:none;align-items:center;gap:6px;animation:blnk 1s infinite}
@keyframes blnk{0%,100%{opacity:1}50%{opacity:.5}}
.recdot{width:7px;height:7px;background:#fff;border-radius:50%}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--accent);border-radius:10px;padding:9px 20px;font-size:13px;color:var(--text);opacity:0;transition:all .28s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SCROLLBAR body */
body::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="5" width="20" height="15" rx="3" fill="url(#lg1)"/>
      <circle cx="8.5" cy="12" r="2.8" fill="rgba(255,255,255,.9)"/>
      <polygon points="15,8 20,15 10,15" fill="rgba(255,255,255,.7)"/>
      <defs><linearGradient id="lg1" x1="0" y1="0" x2="24" y2="24">
        <stop offset="0%" stop-color="#7c5cfc"/><stop offset="100%" stop-color="#fc5c9c"/>
      </linearGradient></defs>
    </svg>
    VIPACH PhotoStudio
  </div>
  <div class="hdr-right">
    <button class="btn btn-sec" id="btnRec" disabled>⏺ Animáció mentése</button>
    <button class="btn btn-pri" id="btnDL" disabled>⬇ Letöltés (HD)</button>
  </div>
</header>

<div class="app">
  <div class="panel">

    <!-- UPLOAD -->
    <div class="upzone" id="upzone">
      <div class="ico">📸</div>
      <p><b>Húzd ide a képet</b><br>vagy kattints a feltöltéshez</p>
      <p style="margin-top:6px;font-size:10px;color:#555">JPG · PNG · WebP · GIF</p>
      <input type="file" id="fileinput" accept="image/*">
    </div>

    <!-- IMAGE INFO -->
    <div class="imginfo" id="imginfo">
      <div class="tw"><img id="thumbimg" src="" alt=""></div>
      <div class="meta" id="imgmeta"></div>
      <button class="btn btn-sec chgbtn" id="chgbtn">📁 Kép cseréje</button>
    </div>

    <!-- ASPECT RATIO -->
    <div class="sec">
      <div class="stitle">Képarány</div>
      <div class="argrid" id="argrid">
        <button class="arbtn active" data-ar="original">
          <svg width="22" height="18"><rect x=".75" y=".75" width="20.5" height="16.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>Eredeti
        </button>
        <button class="arbtn" data-ar="1:1">
          <svg width="18" height="18"><rect x=".75" y=".75" width="16.5" height="16.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>1:1
        </button>
        <button class="arbtn" data-ar="16:9">
          <svg width="22" height="13"><rect x=".75" y=".75" width="20.5" height="11.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>16:9
        </button>
        <button class="arbtn" data-ar="9:16">
          <svg width="13" height="22"><rect x=".75" y=".75" width="11.5" height="20.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>9:16
        </button>
        <button class="arbtn" data-ar="4:3">
          <svg width="20" height="16"><rect x=".75" y=".75" width="18.5" height="14.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>4:3
        </button>
        <button class="arbtn" data-ar="3:4">
          <svg width="16" height="20"><rect x=".75" y=".75" width="14.5" height="18.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>3:4
        </button>
        <button class="arbtn" data-ar="2:3">
          <svg width="14" height="20"><rect x=".75" y=".75" width="12.5" height="18.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>2:3
        </button>
        <button class="arbtn" data-ar="3:2">
          <svg width="20" height="14"><rect x=".75" y=".75" width="18.5" height="12.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>3:2
        </button>
      </div>
    </div>

    <!-- PRESET FILTERS -->
    <div class="sec">
      <div class="stitle">Szűrők</div>
      <div class="pscroll" id="pscroll"></div>
    </div>

    <!-- ADJUSTMENTS -->
    <div class="sec">
      <div class="stitle">Beállítások</div>
      <div id="sliders"></div>
      <div class="reset-row">
        <button class="resetlnk" id="resetbtn">↺ Visszaállítás</button>
      </div>
    </div>

    <!-- ANIMATIONS -->
    <div class="sec">
      <div class="stitle">Animáció</div>
      <div class="animgrid" id="animgrid"></div>
      <div class="sprow">
        <span class="slbl">Sebesség</span>
        <input type="range" class="sinput" id="spdinput" min="0.2" max="3" step="0.1" value="1">
        <span class="sval" id="spdval">1.0×</span>
      </div>
    </div>

  </div><!-- /panel -->

  <!-- CANVAS AREA -->
  <div class="carea" id="carea">
    <div class="empty" id="emptystate">
      <div class="eico">🖼️</div>
      <p>Tölts fel egy képet a szerkesztés megkezdéséhez</p>
      <p style="font-size:11px">Húzd ide, vagy kattints a bal oldali panelre</p>
    </div>
    <div class="cwrap" id="cwrap" style="display:none">
      <canvas id="preview"></canvas>
      <div class="recindicator" id="recindicator">
        <div class="recdot"></div> FELVÉTEL
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ──────────────────────────────────────────────
let origImg = null;
let currentAR = 'original';
let currentAnim = 'none';
let animId = null;
let animT0 = null;
let animSpd = 1;
let recording = false;
let recorder = null;
let recChunks = [];
let currentPreset = 'normal';

const adj = {brightness:100,contrast:100,saturation:100,hue:0,blur:0,grayscale:0,sepia:0,vignette:0};

// ─── PRESETS ─────────────────────────────────────────────
const PRESETS = [
  {id:'normal',   lbl:'Normal',    s:{brightness:100,contrast:100,saturation:100,hue:0,blur:0,grayscale:0,sepia:0,vignette:0}},
  {id:'vivid',    lbl:'Élénk',     s:{brightness:105,contrast:120,saturation:155,hue:0,blur:0,grayscale:0,sepia:0,vignette:12}},
  {id:'cool',     lbl:'Hideg',     s:{brightness:105,contrast:107,saturation:80, hue:185,blur:0,grayscale:0,sepia:0,vignette:15}},
  {id:'warm',     lbl:'Meleg',     s:{brightness:108,contrast:105,saturation:120,hue:-18,blur:0,grayscale:0,sepia:18,vignette:10}},
  {id:'vintage',  lbl:'Vintage',   s:{brightness:112,contrast:88, saturation:78, hue:0,blur:0,grayscale:0,sepia:45,vignette:35}},
  {id:'noir',     lbl:'Noir',      s:{brightness:93, contrast:135,saturation:0,  hue:0,blur:0,grayscale:100,sepia:0,vignette:42}},
  {id:'fade',     lbl:'Halványult',s:{brightness:122,contrast:78, saturation:68, hue:0,blur:0,grayscale:0,sepia:12,vignette:0}},
  {id:'chrome',   lbl:'Chrome',    s:{brightness:106,contrast:118,saturation:132,hue:8,blur:0,grayscale:0,sepia:0,vignette:22}},
  {id:'dramatic', lbl:'Drámai',    s:{brightness:88, contrast:148,saturation:82, hue:0,blur:0,grayscale:12,sepia:0,vignette:52}},
  {id:'dreamy',   lbl:'Álom',      s:{brightness:118,contrast:84, saturation:112,hue:22,blur:1.8,grayscale:0,sepia:6,vignette:22}},
  {id:'matte',    lbl:'Matt',      s:{brightness:108,contrast:82, saturation:90, hue:0,blur:0,grayscale:0,sepia:8,vignette:5}},
];

// ─── SLIDER DEFS ─────────────────────────────────────────
const SLIDERS = [
  {k:'brightness',lbl:'Fényesség', min:0,  max:200, def:100, step:1},
  {k:'contrast',  lbl:'Kontraszt', min:0,  max:200, def:100, step:1},
  {k:'saturation',lbl:'Telítettség',min:0, max:300, def:100, step:1},
  {k:'hue',       lbl:'Szín (+/-)',min:-180,max:180,def:0,   step:1},
  {k:'blur',      lbl:'Blur',      min:0,  max:12,  def:0,   step:0.1},
  {k:'grayscale', lbl:'Szürkeárny.',min:0, max:100, def:0,   step:1},
  {k:'sepia',     lbl:'Szépia',    min:0,  max:100, def:0,   step:1},
  {k:'vignette',  lbl:'Vignetta',  min:0,  max:100, def:0,   step:1},
];

// ─── ANIMATIONS ──────────────────────────────────────────
const ANIMS = [
  {id:'none',     lbl:'Nincs',       ico:'⏹'},
  {id:'kenburns', lbl:'Ken Burns',   ico:'🔍'},
  {id:'fadein',   lbl:'Fade',        ico:'🌅'},
  {id:'pulse',    lbl:'Pulzál',      ico:'💗'},
  {id:'slideL',   lbl:'Csúszik',     ico:'↔️'},
  {id:'rotate',   lbl:'Forog',       ico:'🔄'},
  {id:'shake',    lbl:'Rázás',       ico:'📳'},
  {id:'zoom',     lbl:'Zoom be/ki',  ico:'🔎'},
  {id:'swing',    lbl:'Hinta',       ico:'🎭'},
];

// ─── CANVAS / CTX ────────────────────────────────────────
const canvas = document.getElementById('preview');
const ctx = canvas.getContext('2d');

// ─── BUILD UI ────────────────────────────────────────────
function buildPresets() {
  const cont = document.getElementById('pscroll');
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pbtn' + (p.id==='normal'?' active':'');
    btn.dataset.preset = p.id;
    btn.innerHTML = `<div class="pthumb" id="pt_${p.id}"><canvas id="pc_${p.id}" width="46" height="46"></canvas></div>${p.lbl}`;
    btn.addEventListener('click', () => applyPreset(p.id));
    cont.appendChild(btn);
  });
}

function buildSliders() {
  const cont = document.getElementById('sliders');
  SLIDERS.forEach(s => {
    const row = document.createElement('div');
    row.className = 'srow';
    row.innerHTML = `
      <span class="slbl">${s.lbl}</span>
      <input type="range" class="sinput" id="sl_${s.k}" min="${s.min}" max="${s.max}" step="${s.step}" value="${adj[s.k]}">
      <span class="sval" id="sv_${s.k}">${fmtVal(s.k,adj[s.k])}</span>`;
    cont.appendChild(row);
    row.querySelector(`#sl_${s.k}`).addEventListener('input', e => {
      adj[s.k] = parseFloat(e.target.value);
      document.getElementById(`sv_${s.k}`).textContent = fmtVal(s.k, adj[s.k]);
      currentPreset = null;
      updPresetBtns();
      draw();
    });
  });
  document.getElementById('resetbtn').addEventListener('click', resetAdj);
}

function fmtVal(k,v) {
  if (k==='hue') return (v>0?'+':'')+v+'°';
  if (k==='blur') return v.toFixed(1)+'px';
  return Math.round(v)+'%';
}

function buildAnimGrid() {
  const cont = document.getElementById('animgrid');
  ANIMS.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'animbtn' + (a.id==='none'?' active':'');
    btn.dataset.anim = a.id;
    btn.innerHTML = `<span class="ai">${a.ico}</span>${a.lbl}`;
    btn.addEventListener('click', () => setAnim(a.id));
    cont.appendChild(btn);
  });
  const spd = document.getElementById('spdinput');
  spd.addEventListener('input', e => {
    animSpd = parseFloat(e.target.value);
    document.getElementById('spdval').textContent = animSpd.toFixed(1)+'×';
  });
}

// ─── UPLOAD ───────────────────────────────────────────────
function setupUpload() {
  const upzone = document.getElementById('upzone');
  const fi = document.getElementById('fileinput');
  upzone.addEventListener('click', () => fi.click());
  document.getElementById('chgbtn').addEventListener('click', () => fi.click());
  fi.addEventListener('change', e => { if(e.target.files[0]) loadImg(e.target.files[0]); e.target.value=''; });

  ['dragenter','dragover'].forEach(ev => {
    upzone.addEventListener(ev, e => { e.preventDefault(); upzone.classList.add('over'); });
    document.getElementById('carea').addEventListener(ev, e => e.preventDefault());
  });
  ['dragleave','drop'].forEach(ev => {
    upzone.addEventListener(ev, e => { e.preventDefault(); upzone.classList.remove('over'); });
  });
  document.addEventListener('drop', e => { e.preventDefault(); });
  document.getElementById('carea').addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer?.files[0];
    if (f && f.type.startsWith('image/')) loadImg(f);
  });
  upzone.addEventListener('drop', e => {
    e.preventDefault(); upzone.classList.remove('over');
    const f = e.dataTransfer?.files[0];
    if (f && f.type.startsWith('image/')) loadImg(f);
  });
}

function loadImg(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    origImg = img;
    document.getElementById('thumbimg').src = url;
    document.getElementById('imgmeta').textContent = `${img.width} × ${img.height} px · ${(file.size/1024).toFixed(0)} KB · ${file.name}`;
    document.getElementById('upzone').style.display = 'none';
    document.getElementById('imginfo').classList.add('vis');
    document.getElementById('emptystate').style.display = 'none';
    document.getElementById('cwrap').style.display = 'flex';
    document.getElementById('btnDL').disabled = false;
    document.getElementById('btnRec').disabled = false;
    renderPresetThumbs();
    restartLoop();
  };
  img.onerror = () => toast('❌ Nem sikerült betölteni a képet.');
  img.src = url;
}

// ─── ASPECT RATIO ────────────────────────────────────────
document.getElementById('argrid').addEventListener('click', e => {
  const btn = e.target.closest('.arbtn');
  if (!btn) return;
  document.querySelectorAll('.arbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentAR = btn.dataset.ar;
  restartLoop();
});

function arNum(ar) {
  if (ar==='original') return null;
  const [w,h] = ar.split(':').map(Number);
  return w/h;
}

function canvasSize() {
  if (!origImg) return {w:800,h:600};
  const carea = document.getElementById('carea');
  const maxW = carea.clientWidth * 0.9;
  const maxH = carea.clientHeight * 0.9;
  const imgAR = origImg.width / origImg.height;
  const targetAR = arNum(currentAR) ?? imgAR;
  let w, h;
  if (targetAR >= 1) {
    w = Math.min(maxW, maxH * targetAR);
    h = w / targetAR;
  } else {
    h = Math.min(maxH, maxW / targetAR);
    w = h * targetAR;
  }
  return {w: Math.round(w), h: Math.round(h)};
}

function cropParams(imgW, imgH, canvW, canvH) {
  const iAR = imgW/imgH, tAR = canvW/canvH;
  let sx,sy,sw,sh;
  if (Math.abs(iAR-tAR)<0.002) { sx=0;sy=0;sw=imgW;sh=imgH; }
  else if (iAR>tAR) { sh=imgH; sw=imgH*tAR; sx=(imgW-sw)/2; sy=0; }
  else { sw=imgW; sh=imgW/tAR; sx=0; sy=(imgH-sh)/2; }
  return {sx,sy,sw,sh};
}

// ─── FILTER ──────────────────────────────────────────────
function filterStr(a) {
  const p = [];
  if(a.brightness!==100) p.push(`brightness(${a.brightness}%)`);
  if(a.contrast!==100)   p.push(`contrast(${a.contrast}%)`);
  if(a.saturation!==100) p.push(`saturate(${a.saturation}%)`);
  if(a.hue!==0)          p.push(`hue-rotate(${a.hue}deg)`);
  if(a.blur>0)           p.push(`blur(${a.blur}px)`);
  if(a.grayscale>0)      p.push(`grayscale(${a.grayscale}%)`);
  if(a.sepia>0)          p.push(`sepia(${a.sepia}%)`);
  return p.join(' ') || 'none';
}

function drawVignette(c, w, h, strength) {
  const g = c.createRadialGradient(w/2,h/2,0, w/2,h/2,Math.max(w,h)*0.72);
  const alpha = (strength/100)*0.88;
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(0.5,'rgba(0,0,0,0)');
  g.addColorStop(1,`rgba(0,0,0,${alpha})`);
  c.fillStyle=g; c.fillRect(0,0,w,h);
}

// ─── ANIMATION TRANSFORM ─────────────────────────────────
function animTransform(id, elapsed, w, h) {
  const T = elapsed * animSpd;
  switch(id) {
    case 'kenburns': {
      const zoom = 1 + 0.18*(0.5+0.5*Math.sin(T*0.5));
      const px = w*(zoom-1)*(0.35+0.3*Math.sin(T*0.31));
      const py = h*(zoom-1)*(0.35+0.3*Math.cos(T*0.27));
      return {sx:zoom,sy:zoom,tx:-px/2,ty:-py/2,alpha:1,rot:0};
    }
    case 'fadein': {
      const a = 0.5+0.5*Math.sin(T*1.1);
      return {sx:1,sy:1,tx:0,ty:0,alpha:Math.max(0.08,a),rot:0};
    }
    case 'pulse': {
      const s = 1+0.06*Math.sin(T*2.2);
      return {sx:s,sy:s,tx:0,ty:0,alpha:1,rot:0};
    }
    case 'slideL': {
      const tx = -w*0.07*Math.sin(T*0.9);
      return {sx:1.08,sy:1.08,tx,ty:0,alpha:1,rot:0};
    }
    case 'rotate': {
      return {sx:1,sy:1,tx:0,ty:0,alpha:1,rot:(T*25)%360};
    }
    case 'shake': {
      return {sx:1,sy:1,tx:Math.sin(T*22)*7,ty:Math.cos(T*18)*5,alpha:1,rot:0};
    }
    case 'zoom': {
      const s2 = 1+0.22*(0.5+0.5*Math.sin(T*1.4));
      return {sx:s2,sy:s2,tx:0,ty:0,alpha:1,rot:0};
    }
    case 'swing': {
      return {sx:1,sy:1,tx:0,ty:0,alpha:1,rot:4*Math.sin(T*1.6)};
    }
    default:
      return {sx:1,sy:1,tx:0,ty:0,alpha:1,rot:0};
  }
}

// ─── RENDER ──────────────────────────────────────────────
function drawFrame(ts) {
  if (!origImg) return;
  const {w,h} = canvasSize();
  if (canvas.width!==w) canvas.width=w;
  if (canvas.height!==h) canvas.height=h;

  ctx.clearRect(0,0,w,h);

  const elapsed = (animT0&&ts) ? (ts-animT0)/1000 : 0;
  const tf = animTransform(currentAnim, elapsed, w, h);
  const {sx,sy,sw,sh} = cropParams(origImg.width, origImg.height, w, h);

  ctx.save();
  ctx.filter = filterStr(adj);
  ctx.globalAlpha = tf.alpha;
  ctx.translate(w/2+tf.tx, h/2+tf.ty);
  ctx.scale(tf.sx, tf.sy);
  if (tf.rot!==0) ctx.rotate(tf.rot*Math.PI/180);
  ctx.drawImage(origImg, sx, sy, sw, sh, -w/2, -h/2, w, h);
  ctx.restore();
  ctx.filter='none';
  ctx.globalAlpha=1;

  if (adj.vignette>0) drawVignette(ctx, w, h, adj.vignette);
}

function animLoop(ts) {
  if (!animT0) animT0 = ts;
  drawFrame(ts);
  if (currentAnim!=='none' && origImg) animId = requestAnimationFrame(animLoop);
}

function restartLoop() {
  if (animId) { cancelAnimationFrame(animId); animId=null; }
  animT0 = null;
  if (!origImg) return;
  if (currentAnim!=='none') {
    animId = requestAnimationFrame(animLoop);
  } else {
    drawFrame(null);
  }
}

function draw() {
  if (!origImg) return;
  if (currentAnim==='none') drawFrame(null);
  // if animating, loop handles it
}

// ─── PRESETS ─────────────────────────────────────────────
function applyPreset(id) {
  const p = PRESETS.find(x=>x.id===id);
  if (!p) return;
  currentPreset = id;
  Object.assign(adj, p.s);
  SLIDERS.forEach(s => {
    const el = document.getElementById(`sl_${s.k}`);
    const vl = document.getElementById(`sv_${s.k}`);
    if(el) el.value = adj[s.k];
    if(vl) vl.textContent = fmtVal(s.k, adj[s.k]);
  });
  updPresetBtns();
  draw();
}

function updPresetBtns() {
  document.querySelectorAll('.pbtn').forEach(b => b.classList.toggle('active', b.dataset.preset===currentPreset));
}

function resetAdj() {
  SLIDERS.forEach(s => { adj[s.k]=s.def; });
  currentPreset='normal';
  SLIDERS.forEach(s => {
    const el=document.getElementById(`sl_${s.k}`);
    const vl=document.getElementById(`sv_${s.k}`);
    if(el) el.value=adj[s.k];
    if(vl) vl.textContent=fmtVal(s.k,adj[s.k]);
  });
  updPresetBtns();
  draw();
}

// ─── ANIMATIONS ──────────────────────────────────────────
function setAnim(id) {
  currentAnim = id;
  document.querySelectorAll('.animbtn').forEach(b => b.classList.toggle('active', b.dataset.anim===id));
  restartLoop();
}

// ─── PRESET THUMBNAILS ───────────────────────────────────
function renderPresetThumbs() {
  if (!origImg) return;
  const iAR = origImg.width/origImg.height;
  let sx,sy,sw,sh;
  if (iAR>1) { sw=sh=origImg.height; sx=(origImg.width-sw)/2; sy=0; }
  else { sw=sh=origImg.width; sx=0; sy=(origImg.height-sh)/2; }

  PRESETS.forEach(p => {
    const c = document.getElementById(`pc_${p.id}`);
    if(!c) return;
    c.width=46; c.height=46;
    const pc = c.getContext('2d');
    pc.filter = filterStr(p.s);
    pc.drawImage(origImg, sx, sy, sw, sh, 0, 0, 46, 46);
    pc.filter='none';
    if(p.s.vignette>0) drawVignette(pc,46,46,p.s.vignette);
  });
}

// ─── DOWNLOAD ────────────────────────────────────────────
document.getElementById('btnDL').addEventListener('click', downloadHD);
document.getElementById('btnRec').addEventListener('click', toggleRec);

function downloadHD() {
  if (!origImg) return;
  const tAR = arNum(currentAR) ?? (origImg.width/origImg.height);
  const maxSide = Math.min(Math.max(origImg.width, origImg.height), 4096);
  let outW, outH;
  if (tAR>=1) { outW=maxSide; outH=Math.round(maxSide/tAR); }
  else { outH=maxSide; outW=Math.round(maxSide*tAR); }

  const off = document.createElement('canvas');
  off.width=outW; off.height=outH;
  const oc = off.getContext('2d');

  const {sx,sy,sw,sh} = cropParams(origImg.width, origImg.height, outW, outH);
  oc.filter = filterStr(adj);
  oc.drawImage(origImg, sx, sy, sw, sh, 0, 0, outW, outH);
  oc.filter='none';
  if (adj.vignette>0) drawVignette(oc,outW,outH,adj.vignette);

  off.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`photostudio_${Date.now()}.jpg`;
    a.click(); URL.revokeObjectURL(url);
    toast('✅ Kép letöltve! ('+outW+'×'+outH+' px)');
  }, 'image/jpeg', 0.95);
}

function toggleRec() {
  if (recording) stopRec(); else startRec();
}

function startRec() {
  if (!origImg) return;
  if (currentAnim==='none') { toast('⚠️ Válassz animációt a felvétel előtt!'); return; }
  try {
    const stream = canvas.captureStream(30);
    recChunks = [];
    const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9' : 'video/webm';
    recorder = new MediaRecorder(stream, {mimeType:mime, videoBitsPerSecond:8000000});
    recorder.ondataavailable = e => { if(e.data.size>0) recChunks.push(e.data); };
    recorder.onstop = exportVid;
    recorder.start(100);
    recording = true;
    document.getElementById('recindicator').style.display='flex';
    const btn = document.getElementById('btnRec');
    btn.className='btn btn-red';
    btn.innerHTML='⏹ Leállítás';
    toast('⏺ Felvétel elkezdve (5 mp)…');
    setTimeout(() => { if(recording) stopRec(); }, 5000);
  } catch(e) {
    toast('❌ Felvétel nem elérhető ebben a böngészőben.');
  }
}

function stopRec() {
  if (!recording||!recorder) return;
  recorder.stop();
  recording=false;
  document.getElementById('recindicator').style.display='none';
  const btn=document.getElementById('btnRec');
  btn.className='btn btn-sec';
  btn.innerHTML='⏺ Animáció mentése';
}

function exportVid() {
  const blob = new Blob(recChunks,{type:'video/webm'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`animation_${Date.now()}.webm`;
  a.click(); URL.revokeObjectURL(url);
  toast('✅ Animáció letöltve! (.webm)');
}

// ─── TOAST ───────────────────────────────────────────────
let toastTmr;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('show'),3200);
}

// ─── RESIZE ──────────────────────────────────────────────
window.addEventListener('resize', () => { if(origImg) { if(currentAnim==='none') draw(); } });

// ─── INIT ────────────────────────────────────────────────
buildPresets();
buildSliders();
buildAnimGrid();
setupUpload();
</script>
